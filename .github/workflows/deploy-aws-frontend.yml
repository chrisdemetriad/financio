name: Deploy Frontend

# Runs independently of the API deploy. Push path filters avoid rebuilding/pushing
# the Docker image when only the web app (or shared packages the web uses) changes.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  APP_NAME: financio

jobs:
  deploy:
    name: Build → S3 → CloudFront
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Validate AWS auth configuration
        shell: bash
        run: |
          if [ -n "${AWS_ROLE_ARN}" ] && [ -n "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Configure either AWS_ROLE_ARN or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY, not both."
            exit 1
          fi

          if [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "AWS_SECRET_ACCESS_KEY is required when using AWS_ACCESS_KEY_ID."
            exit 1
          fi

          if [ -z "${AWS_ROLE_ARN}" ] && [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Missing AWS auth secrets."
            echo "Set either AWS_ROLE_ARN or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      - name: Validate frontend build secrets
        shell: bash
        run: |
          if [ -z "${VITE_CLERK_PUBLISHABLE_KEY}" ]; then
            echo "Missing VITE_CLERK_PUBLISHABLE_KEY GitHub secret."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN != '' && env.AWS_ACCESS_KEY_ID == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (Access Keys)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account
        id: aws-account
        shell: bash
        run: |
          echo "value=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Resolve API and frontend targets
        id: targets
        shell: bash
        run: |
          API_ENDPOINT=$(aws ecs describe-express-gateway-service \
            --service-arn arn:aws:ecs:${AWS_REGION}:${{ steps.aws-account.outputs.value }}:service/default/${APP_NAME}-api \
            --query 'service.activeConfigurations[0].ingressPaths[0].endpoint' \
            --output text)

          if [ -z "${API_ENDPOINT}" ] || [ "${API_ENDPOINT}" = "None" ]; then
            echo "Could not resolve AWS API endpoint from ECS Express Mode."
            exit 1
          fi

          FRONTEND_BUCKET=${APP_NAME}-web-${{ steps.aws-account.outputs.value }}
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${APP_NAME}-web'].Id | [0]" \
            --output text)
          DISTRIBUTION_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${APP_NAME}-web'].DomainName | [0]" \
            --output text)

          if [ -z "${DISTRIBUTION_ID}" ] || [ "${DISTRIBUTION_ID}" = "None" ]; then
            echo "Could not resolve CloudFront distribution for ${APP_NAME}-web."
            echo "Run terraform apply for the AWS frontend hosting resources first."
            exit 1
          fi

          echo "VITE_API_URL=https://${API_ENDPOINT}" >> $GITHUB_ENV
          echo "FRONTEND_BUCKET=${FRONTEND_BUCKET}" >> $GITHUB_ENV
          echo "DISTRIBUTION_ID=${DISTRIBUTION_ID}" >> $GITHUB_ENV
          echo "DISTRIBUTION_DOMAIN=${DISTRIBUTION_DOMAIN}" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `github.run_started_at` is not a reliable Actions context field; use an
      # explicit UTC ISO timestamp so Vite can embed it at build time.
      - name: Record deploy timestamp (UTC)
        id: frontend_meta
        shell: bash
        run: echo "deployed_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_DEPLOYED_AT: ${{ steps.frontend_meta.outputs.deployed_at_utc }}
        run: pnpm build

      - name: Upload frontend to S3
        run: |
          aws s3 sync apps/web/dist "s3://${FRONTEND_BUCKET}" --delete
          aws s3 cp apps/web/dist/index.html "s3://${FRONTEND_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Print frontend URL
        run: |
          echo "Frontend deployed."
          echo "URL: https://${DISTRIBUTION_DOMAIN}"

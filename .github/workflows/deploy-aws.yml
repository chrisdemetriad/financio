name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token
  contents: read

env:
  AWS_REGION: eu-west-2
  APP_NAME: financio

jobs:
  deploy:
    name: Build → ECR → App Runner
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Validate AWS auth configuration
        shell: bash
        run: |
          if [ -n "${AWS_ROLE_ARN}" ] && [ -n "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Configure either AWS_ROLE_ARN or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY, not both."
            exit 1
          fi

          if [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "AWS_SECRET_ACCESS_KEY is required when using AWS_ACCESS_KEY_ID."
            exit 1
          fi

          if [ -z "${AWS_ROLE_ARN}" ] && [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Missing AWS auth secrets."
            echo "Set either AWS_ROLE_ARN or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      # Keyless auth via OIDC — no AWS_ACCESS_KEY_ID stored in secrets
      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN != '' && env.AWS_ACCESS_KEY_ID == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Simpler fallback using long-lived access keys stored in GitHub secrets
      - name: Configure AWS credentials (Access Keys)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            -f Dockerfile.api \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-api:${{ env.IMAGE_TAG }} \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-api:latest \
            .
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-api:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-api:latest

      - name: Deploy to App Runner
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ env.APP_NAME }}-api'].ServiceArn" \
            --output text)

          aws apprunner start-deployment \
            --service-arn $SERVICE_ARN

          echo "Deployment started — App Runner will pull the new image."
          echo "Monitor at: https://console.aws.amazon.com/apprunner"

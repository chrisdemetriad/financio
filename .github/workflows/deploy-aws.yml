name: Deploy to AWS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC token
  contents: read

env:
  AWS_REGION: eu-west-2
  APP_NAME: financio

jobs:
  deploy:
    name: Build → ECR → ECS Express Mode
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Validate AWS auth configuration
        shell: bash
        run: |
          if [ -n "${AWS_ROLE_ARN}" ] && [ -n "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Configure either AWS_ROLE_ARN or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY, not both."
            exit 1
          fi

          if [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "AWS_SECRET_ACCESS_KEY is required when using AWS_ACCESS_KEY_ID."
            exit 1
          fi

          if [ -z "${AWS_ROLE_ARN}" ] && [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "Missing AWS auth secrets."
            echo "Set either AWS_ROLE_ARN or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      # Keyless auth via OIDC — no AWS_ACCESS_KEY_ID stored in secrets
      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_ARN != '' && env.AWS_ACCESS_KEY_ID == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Simpler fallback using long-lived access keys stored in GitHub secrets
      - name: Configure AWS credentials (Access Keys)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve AWS account
        id: aws-account
        shell: bash
        run: |
          echo "value=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            -f Dockerfile.api \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-api:${{ steps.image-tag.outputs.value }} \
            -t $ECR_REGISTRY/${{ env.APP_NAME }}-api:latest \
            .
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-api:${{ steps.image-tag.outputs.value }}
          docker push $ECR_REGISTRY/${{ env.APP_NAME }}-api:latest

      - name: Deploy to ECS Express Mode
        id: ecs-deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          cluster: default
          service-name: ${{ env.APP_NAME }}-api
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.APP_NAME }}-api:${{ steps.image-tag.outputs.value }}
          execution-role-arn: arn:aws:iam::${{ steps.aws-account.outputs.value }}:role/${{ env.APP_NAME }}-ecs-task-execution
          infrastructure-role-arn: arn:aws:iam::${{ steps.aws-account.outputs.value }}:role/${{ env.APP_NAME }}-ecs-infrastructure
          task-role-arn: arn:aws:iam::${{ steps.aws-account.outputs.value }}:role/${{ env.APP_NAME }}-ecs-task
          container-port: 3001
          health-check-path: /health
          cpu: '1024'
          memory: '2048'
          min-task-count: 1
          max-task-count: 5
          auto-scaling-metric: AVERAGE_CPU
          auto-scaling-target-value: 70
          log-group: /financio/api
          log-stream-prefix: ecs/Main
          environment-variables: |
            [
              {"name":"NODE_ENV","value":"production"},
              {"name":"PORT","value":"3001"},
              {"name":"HOST","value":"0.0.0.0"},
              {"name":"STORAGE_CLOUD","value":"aws"},
              {"name":"AWS_REGION","value":"${{ env.AWS_REGION }}"},
              {"name":"AWS_S3_BUCKET","value":"${{ env.APP_NAME }}-assets"},
              {"name":"APP_NAME","value":"${{ env.APP_NAME }}-api"},
              {"name":"AWS_ECS_CLUSTER_NAME","value":"default"}
            ]
          secrets: |
            [
              {"name":"CORS_ORIGIN","valueFrom":"/${{ env.APP_NAME }}/cors_origin"},
              {"name":"DATABASE_URL","valueFrom":"/${{ env.APP_NAME }}/database_url"},
              {"name":"CLERK_SECRET_KEY","valueFrom":"/${{ env.APP_NAME }}/clerk_secret_key"},
              {"name":"OPENAI_API_KEY","valueFrom":"/${{ env.APP_NAME }}/openai_api_key"},
              {"name":"BRANDFETCH_API_KEY","valueFrom":"/${{ env.APP_NAME }}/brandfetch_api_key"}
            ]

      - name: Print ECS endpoint
        run: |
          echo "Deployment complete."
          echo "Endpoint: ${{ steps.ecs-deploy.outputs.endpoint }}"

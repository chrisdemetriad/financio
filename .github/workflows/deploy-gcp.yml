name: Deploy to GCP

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write   # Required for Workload Identity Federation
  contents: read

env:
  GCP_PROJECT: financio-495909
  GCP_REGION: europe-west1
  APP_NAME: financio
  ARTIFACT_REPO: financio-api

jobs:
  deploy:
    name: Build → Artifact Registry → Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    env:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Validate GCP auth configuration
        shell: bash
        run: |
          if [ -n "${GCP_CREDENTIALS_JSON}" ] && [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]; then
            echo "Configure either GCP_CREDENTIALS_JSON or GCP_WORKLOAD_IDENTITY_PROVIDER/GCP_SERVICE_ACCOUNT, not both."
            exit 1
          fi

          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ] && [ -z "${GCP_SERVICE_ACCOUNT}" ]; then
            echo "GCP_SERVICE_ACCOUNT is required when using GCP_WORKLOAD_IDENTITY_PROVIDER."
            exit 1
          fi

          if [ -z "${GCP_CREDENTIALS_JSON}" ] && [ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" ]; then
            echo "Missing GCP auth secrets."
            echo "Set either GCP_CREDENTIALS_JSON or both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT."
            exit 1
          fi

      # Keyless auth via Workload Identity Federation
      - name: Authenticate to GCP (Workload Identity)
        if: ${{ env.GCP_CREDENTIALS_JSON == '' && env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Simpler fallback using a service-account JSON key stored in GitHub secrets
      - name: Authenticate to GCP (Service Account JSON)
        if: ${{ env.GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.APP_NAME }}-api
        run: |
          docker build \
            -f Dockerfile.api \
            -t $IMAGE_BASE:${{ env.IMAGE_TAG }} \
            -t $IMAGE_BASE:latest \
            .
          docker push $IMAGE_BASE:${{ env.IMAGE_TAG }}
          docker push $IMAGE_BASE:latest

      - name: Deploy to Cloud Run
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/${{ env.APP_NAME }}-api
        run: |
          gcloud run deploy ${{ env.APP_NAME }}-api \
            --image $IMAGE_BASE:${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --quiet

          echo "Deployment complete."
          gcloud run services describe ${{ env.APP_NAME }}-api \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.url)"
